<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoristin Sääreitit</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #e0e0e0; display: flex;
        }
        #sidebar {
            width: 360px; background-color: #1e1e1e; padding: 25px;
            box-shadow: 3px 0 15px rgba(0,0,0,0.6); display: flex;
            flex-direction: column; gap: 18px; z-index: 1000;
            overflow-y: auto;
        }
        h2 { margin-top: 0; color: #ff9800; font-size: 1.5rem; letter-spacing: 0.5px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; color: #b0b0b0; font-weight: 600; }
        input, select {
            background-color: #2d2d2d; border: 1px solid #444;
            color: #fff; padding: 12px; border-radius: 6px; font-size: 1rem;
            width: 100%; transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: #ff9800; outline: none; }
        button {
            background-color: #ff9800; color: #121212; border: none;
            padding: 14px; border-radius: 6px; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.1s;
            margin-top: 10px; width: 100%;
        }
        button:hover { background-color: #e65100; }
        button:active { transform: scale(0.98); }
        #status { color: #ffb74d; font-size: 0.9rem; font-style: italic; min-height: 20px; }
        
        #recommendation-box {
            padding: 15px; border-radius: 6px; font-size: 0.95rem;
            font-weight: bold; display: none; margin-top: 5px;
            border-left: 5px solid #ff9800; background-color: #2a251e;
            line-height: 1.4;
        }
        #info-box {
            margin-top: 5px; padding: 15px; background-color: #2d2d2d;
            border-radius: 6px; font-size: 0.9rem; display: none;
            line-height: 1.5;
        }
        .weather-info {
            margin-top: 10px; padding: 10px; background: #383838; 
            border-radius: 4px; border-left: 4px solid #4caf50;
        }
        .rainy { border-left-color: #2196f3 !important; background: #1a2635; }
        #map { flex-grow: 1; height: 100%; }

        /* Mobiilioptimointi */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 45%; padding: 15px; }
            #map { width: 100%; height: 55%; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🏍️ Motoristin Sääreitit</h2>
        
        <div class="input-group">
            <label for="start">Lähtöpaikka:</label>
            <input type="text" id="start" placeholder="Esim. Helsinki" value="Helsinki">
        </div>

        <div class="input-group">
            <label for="end">Määränpää:</label>
            <input type="text" id="end" placeholder="Esim. Tampere" value="Tampere">
        </div>

        <div class="input-group">
            <label for="routeProfile">Reittiprofiili:</label>
            <select id="routeProfile">
                <option value="isot-tiet">Isot tiet (Nopein)</option>
                <option value="pikkutiet">Pikkutiet & Mutkat (Vältä moottoriteitä)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="startTime">Suunniteltu lähtö:</label>
            <select id="startTime">
                <option value="0">Heti</option>
                <option value="1">+1 tunnin kuluttua</option>
                <option value="2">+2 tunnin kuluttua</option>
                <option value="3">+3 tunnin kuluttua</option>
            </select>
        </div>

        <button onclick="haeReitti()">Laske paras ajankohta</button>
        
        <div id="status"></div>
        <div id="recommendation-box"></div>
        <div id="info-box"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // =================================================================
        // 🔴 KORVAA TÄHÄN OMA CLOUDFLARE WORKER -OSOITTEESI:
        // =================================================================
        const PROXY_URL = "https://ors-proxy.motoristinsaakartta.workers.dev";

        // Alustetaan kartta Suomen kohdalle
        var map = L.map('map').setView([62.5, 26], 6);
        
        // Tyylikäs tumma karttapohja (CartoDB DarkMatter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        var reittiViiva = null;
        var merkit = [];

        // Sääkoodien selitykset suomeksi (WMO-koodit)
        const wmoSaaKaannokset = {
            0: "Selkeää", 1: "Melko selkeää", 2: "Puolipilvistä", 3: "Pilvistä",
            45: "Sumua", 48: "Huurresumua", 51: "Heikkoa tihkua", 53: "Tihkua",
            61: "Heikkoa vesisadetta", 63: "Vesisadetta", 65: "Rankkasadetta",
            71: "Heikkoa lumisadetta", 73: "Lumisadetta", 80: "Heikkoja kuuroja",
            81: "Sadekuuroja", 95: "Ukkosta"
        };

        // Haetaan paikan koordinaatit avoimesta Nominatim-palvelusta
        async function haeKoordinaatit(paikka) {
            try {
                var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(paikka)}`;
                var vastaus = await fetch(url);
                var data = await vastaus.json();
                if (data && data.length > 0) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            } catch (e) { console.error("Paikkahaku epäonnistui", e); }
            return null;
        }

        // Keskustellaan OpenRouteServicen kanssa suojatun Cloudflare-proxysi kautta
        async function haeTieReittiProxylla(lahto, maaranpaa, tyyppi) {
            try {
                var pyyntoBody = {
                    coordinates: [[lahto[1], lahto[0]], [maaranpaa[1], maaranpaa[0]]]
                };
                
                // Jos käyttäjä haluaa pikkutiet, käsketään ORS:ää välttämään moottoriteitä
                if (tyyppi === "pikkutiet") {
                    pyyntoBody.options = { avoid_features: ["highways"] };
                }

                var vastaus = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify(pyyntoBody)
                });
                
                var data = await vastaus.json();
                if (data && data.features && data.features.length > 0) {
                    var feature = data.features[0];
                    return {
                        coordinates: feature.geometry.coordinates,
                        duration: feature.properties.summary.duration,
                        distance: feature.properties.summary.distance
                    };
                }
            } catch (e) { console.error("Reittihaku Cloudflaren kautta epäonnistui", e); }
            return null;
        }

        // Haetaan ilmainen sääennuste Open-Meteo API:sta
        async function haeOpenMeteoSaa(lat, lon) {
            try {
                var url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation,weather_code&timezone=auto`;
                var vastaus = await fetch(url);
                if (vastaus.ok) return await vastaus.json();
            } catch (e) { console.error("Sään haku epäonnistui", e); }
            return null;
        }

        // Etsitään oikea sää tavoiteajankohdan mukaan
        function tulkitseSaaTulevaisuudessa(openMeteoData, tavoiteAika) {
            if (!openMeteoData || !openMeteoData.hourly || !openMeteoData.hourly.time) return null;
            var aikasarja = openMeteoData.hourly.time;
            var valittuIndeksi = 0;
            var pieninEro = Infinity;
            
            for (var i = 0; i < aikasarja.length; i++) {
                var ero = Math.abs(new Date(aikasarja[i]) - tavoiteAika);
                if (ero < pieninEro) { pieninEro = ero; valittuIndeksi = i; }
            }
            
            return {
                teksti: `${wmoSaaKaannokset[openMeteoData.hourly.weather_code[valittuIndeksi]] || "Vaihtelevaa"}, ${Math.round(openMeteoData.hourly.temperature_2m[valittuIndeksi])}°C`,
                sade: openMeteoData.hourly.precipitation[valittuIndeksi],
                aika: new Date(aikasarja[valittuIndeksi]).toLocaleTimeString('fi-FI', {hour: '2-digit', minute:'2-digit'})
            };
        }

        // Pääfunktio, joka suorittaa koko ketjun
        async function haeReitti() {
            var lahtoPaikka = document.getElementById('start').value;
            var maaranPaikka = document.getElementById('end').value;
            var valittuViiveTunnit = parseInt(document.getElementById('startTime').value);
            var reittiProfiili = document.getElementById('routeProfile').value;

            var statusKentta = document.getElementById('status');
            var infoLaatikko = document.getElementById('info-box');
            var suositusLaatikko = document.getElementById('recommendation-box');

            statusKentta.innerText = "Selvitetään paikkoja...";
            infoLaatikko.style.display = "none";
            suositusLaatikko.style.display = "none";

            // Tyhjennetään vanhat piirrokset kartalta
            if (reittiViiva) map.removeLayer(reittiViiva);
            merkit.forEach(m => map.removeLayer(m));
            merkit = [];

            var lahtoKoord = await haeKoordinaatit(lahtoPaikka);
            var maaranKoord = await haeKoordinaatit(maaranPaikka);

            if (!lahtoKoord || !maaranKoord) {
                statusKentta.innerText = "❌ Virhe: Paikkaa ei löytynyt.";
                return;
            }

            statusKentta.innerText = "Haetaan reittivaihtoehtoja Cloudflaresta...";
            var reittiData = await haeTieReittiProxylla(lahtoKoord, maaranKoord, reittiProfiili);
            if (!reittiData) {
                statusKentta.innerText = "❌ Virhe: Cloudflare-proxyyn ei saatu yhteyttä.";
                return;
            }

            // Muutetaan koordinaatit Leaflet-muotoon ja piirretään viiva
            var tiePisteet = reittiData.coordinates.map(piste => [piste[1], piste[0]]);
            reittiViiva = L.polyline(tiePisteet, {color: '#ff9800', weight: 5}).addTo(map);
            map.fitBounds(reittiViiva.getBounds(), {padding: [50, 50]});

            var matkaAikaMinuutit = Math.round(reittiData.duration / 60);
            var etaisyysKm = (reittiData.distance / 1000).toFixed(1);
            var aikaTeksti = matkaAikaMinuutit > 60 ? `${Math.floor(matkaAikaMinuutit/60)} t ${matkaAikaMinuutit%60} min` : `${matkaAikaMinuutit} min`;

            // Jaetaan matka tarkistuspisteisiin tunnin välein sääseurantaa varten
            var pisteet = [{ indeksi: 0, nimi: "Lähtöpaikka", viive: 0 }];
            var tuntejaMatkassa = Math.floor(matkaAikaMinuutit / 60);
            for (var t = 1; t <= tuntejaMatkassa; t++) {
                var vMin = t * 60;
                if (matkaAikaMinuutit - vMin > 15) {
                    pisteet.push({ indeksi: Math.floor((vMin / matkaAikaMinuutit) * (tiePisteet.length - 1)), nimi: `Ajettu ${t} t`, viive: vMin });
                }
            }
            pisteet.push({ indeksi: tiePisteet.length - 1, nimi: "Määränpää", viive: matkaAikaMinuutit });

            statusKentta.innerText = "Analysoidaan reitin sääolosuhteita...";
            var pisteidenSaaDatat = [];
            for (var p of pisteet) {
                pisteidenSaaDatat.push(await haeOpenMeteoSaa(tiePisteet[p.indeksi][0], tiePisteet[p.indeksi][1]));
            }

            // Verrataan valittua aikaa ja kahta seuraavaa tuntia (älykäs ajoitussuositus)
            var skenaariot = [valittuViiveTunnit, valittuViiveTunnit + 1, valittuViiveTunnit + 2];
            var skenaarioTulokset = [];

            for (var viive of skenaariot) {
                var kokonaisSade = 0;
                var tulkitutSäät = [];
                for (var i = 0; i < pisteet.length; i++) {
                    var tAika = new Date();
                    tAika.setMinutes(tAika.getMinutes() + (viive * 60) + pisteet[i].viive);
                    var tulos = tulkitseSaaTulevaisuudessa(pisteidenSaaDatat[i], tAika);
                    if (tulos) { kokonaisSade += tulos.sade; tulkitutSäät.push(tulos); }
                }
                skenaarioTulokset.push({ viive: viive, kokonaisSade: kokonaisSade, saas: tulkitutSäät });
            }

            var valittuSkenaario = skenaarioTulokset[0];
            var parasSkenaario = skenaarioTulokset.reduce((prev, current) => (prev.kokonaisSade <= current.kokonaisSade) ? prev : current);

            // Tulostetaan suositus laatikkoon
            suositusLaatikko.style.display = "block";
            if (parasSkenaario.viive === valittuViiveTunnit || valittuSkenaario.kokonaisSade === parasSkenaario.kokonaisSade) {
                suositusLaatikko.style.color = "#4caf50"; suositusLaatikko.style.borderLeftColor = "#4caf50";
                suositusLaatikko.innerHTML = "☀️ <b>Suositus:</b> Valitsemasi lähtöaika näyttää hyvältä ja kuivimmalta vaihtoehdolta!";
            } else {
                suositusLaatikko.style.color = "#ff9800"; suositusLaatikko.style.borderLeftColor = "#ff9800";
                suositusLaatikko.innerHTML = `🌧️ <b>Suositus:</b> Reitillä sataa. Kannattaa siirtää lähtöä <b>+${parasSkenaario.viive - valittuViiveTunnit} tunti(a)</b> eteenpäin sateen välttämiseksi.`;
            }

            // Täytetään reittitiedot sivupalkkiin
            infoLaatikko.innerHTML = `<strong>Matkatiedot:</strong><br>🗺️ ${etaisyysKm} km | ⏱️ ${aikaTeksti}<br><br><strong>Sää matkan varrella:</strong><div id="weather-list"></div>`;
            infoLaatikko.style.display = "block";
            var saaListaElementti = document.getElementById('weather-list');

            // Lisätään merkit kartalle ja säärivid listaan
            for (var i = 0; i < pisteet.length; i++) {
                var p = pisteet[i];
                var saa = valittuSkenaario.saas[i];
                if (saa) {
                    var sateenVariLuokka = saa.sade > 0 ? 'rainy' : '';
                    var markkeri = L.marker(tiePisteet[p.indeksi]).addTo(map).bindPopup(`<b>${p.nimi}</b><br>${saa.teksti}`);
                    merkit.push(markkeri);
                    saaListaElementti.innerHTML += `<div class="weather-info ${sateenVariLuokka}"><strong>${p.nimi} (Klo ${saa.aika}):</strong><br>${saa.teksti} (${saa.sade} mm)</div>`;
                }
            }
            statusKentta.innerText = "Reitti ja sääolosuhteet päivitetty!";
        }
    </script>
</body>
</html>
