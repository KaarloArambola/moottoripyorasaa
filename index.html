<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoristin Sääreitit</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Perusasetukset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
        }

        /* Sivupalkki hakuja varten */
        #sidebar {
            width: 320px;
            background-color: #1e1e1e;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        h2 {
            margin-top: 0;
            color: #ff9800; /* Oranssi teemaväri motoristihengessä */
            font-size: 1.4rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
        }

        input {
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 1rem;
        }

        input:focus {
            border-color: #ff9800;
            outline: none;
        }

        button {
            background-color: #ff9800;
            color: #121212;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #e65100;
        }

        /* Kartta täyttää lopun ruudun */
        #map {
            flex-grow: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🏍️ Sääreitit</h2>
        
        <div class="input-group">
            <label for="start">Mistä:</label>
            <input type="text" id="start" placeholder="Esim. Helsinki" value="Helsinki">
        </div>

        <div class="input-group">
            <label for="end">Mihin:</label>
            <input type="text" id="end" placeholder="Esim. Tampere" value="Tampere">
        </div>

        <button onclick="haeReitti()">Laske kuiva reitti</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Alustetaan kartta uudelleen
        var map = L.map('map').setView([62.5, 26], 6);

        // Tyylikäs tumma karttapohja (Sopii paremmin sovelluksen teemaan)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        // Funktio, jota kutsutaan kun nappia painetaan
        function haeReitti() {
            var lahto = document.getElementById('start').value;
            var maaranpaa = document.getElementById('end').value;
            
            alert("Haetaan reittiä: " + lahto + " -> " + maaranpaa + "\n\nTämä toiminto kytketään seuraavaksi reittimoottoriin!");
        }
    </script>

</body>
</html>
