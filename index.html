<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoristin Sääreitit (yr.no)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #e0e0e0; display: flex;
        }
        #sidebar {
            width: 320px; background-color: #1e1e1e; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; gap: 15px; z-index: 1000;
            overflow-y: auto;
        }
        h2 { margin-top: 0; color: #ff9800; font-size: 1.4rem; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #aaa; }
        input {
            background-color: #2d2d2d; border: 1px solid #444;
            color: #fff; padding: 10px; border-radius: 5px; font-size: 1rem;
        }
        input:focus { border-color: #ff9800; outline: none; }
        button {
            background-color: #ff9800; color: #121212; border: none;
            padding: 12px; border-radius: 5px; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #e65100; }
        #status { color: #ffb74d; font-size: 0.9rem; font-style: italic; }
        #info-box {
            margin-top: 15px; padding: 10px; background-color: #2d2d2d;
            border-radius: 5px; font-size: 0.9rem; display: none;
        }
        .weather-info {
            margin-top: 10px; padding: 8px; background: #383838; 
            border-radius: 4px; border-left: 4px solid #4caf50; /* Vihreä = Pouta */
        }
        .rainy { border-left-color: #2196f3 !important; background: #263238; } /* Sininen = Sade */
        #map { flex-grow: 1; height: 100%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🏍️ Sääreitit (yr.no)</h2>
        
        <div class="input-group">
            <label for="start">Mistä:</label>
            <input type="text" id="start" placeholder="Esim. Helsinki" value="Helsinki">
        </div>

        <div class="input-group">
            <label for="end">Mihin:</label>
            <input type="text" id="end" placeholder="Esim. Tampere" value="Tampere">
        </div>

        <button onclick="haeReitti()">Laske sääreitti</button>
        
        <div id="status"></div>
        <div id="info-box"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        var map = L.map('map').setView([62.5, 26], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        var reittiViiva = null;
        var merkit = [];

        async function haeKoordinaatit(paikka) {
            var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(paikka)}&countrycodes=fi`;
            var vastaus = await fetch(url);
            var data = await vastaus.json();
            if (data && data.length > 0) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            return null;
        }

        async function haeTieReitti(lahto, maaranpaa) {
            var url = `https://router.project-osrm.org/route/v1/driving/${lahto[1]},${lahto[0]};${maaranpaa[1]},${maaranpaa[0]}?overview=full&geometries=geojson`;
            var vastaus = await fetch(url);
            var data = await vastaus.json();
            if (data && data.routes && data.routes.length > 0) return data.routes[0];
            return null;
        }

        // UUSI FUNKTIO: Hakee säätiedot yr.no (MET Norway) rajapinnasta
        async function haeYrSaa(lat, lon) {
            // yr.no vaatii tarkan lat/lon muotoilun (4 desimaalia riittää)
            var pyoristettyLat = lat.toFixed(4);
            var pyoristettyLon = lon.toFixed(4);
            
            var url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${pyoristettyLat}&lon=${pyoristettyLon}`;
            
            try {
                var vastaus = await fetch(url, {
                    headers: {
                        // yr.no sääntö: Kerrotaan kuka kysyy (voit muuttaa tähän oman nimesi myöhemmin)
                        'User-Agent': 'MotoristinSääreititProjekti/1.0 opiskelijaprojekti'
                    }
                });
                var data = await vastaus.json();
                return data;
            } catch (e) {
                console.error("Säänhaku epäonnistui:", e);
                return null;
            }
        }

        // Apufunktio, joka poimii yr.no:n datasta tämän hetken sään
        function tulkitseSaa(yrData) {
            if (!yrData || !yrData.properties || !yrData.properties.timeseries) return null;
            
            // Otetaan ensimmäinen ennuste (eli nykyhetki)
            var nykyhetki = yrData.properties.timeseries[0];
            var data1h = nykyhetki.data.next_1_hours;
            
            var lampotila = nykyhetki.data.instant.details.air_temperature;
            var saaKoodi = data1h ? data1h.summary.symbol_code : "tuntematon";
            var sademaara = data1h ? data1h.details.precipitation_amount : 0;

            // Muutetaan yr.no:n englanninkieliset sääkoodit (esim. 'clearsky', 'rain') vähän helpommaksi suomeksi
            var suomiKuvaus = saaKoodi.replace(/_/g, ' '); // korvataan alaviivat välilyönneillä

            return {
                teksti: `${suomiKuvaus}, ${Math.round(lampotila)}°C`,
                sade: sademaara,
                koodi: saaKoodi
            };
        }

        async function haeReitti() {
            var lahtoPaikka = document.getElementById('start').value;
            var maaranPaikka = document.getElementById('end').value;
            var statusKentta = document.getElementById('status');
            var infoLaatikko = document.getElementById('info-box');

            statusKentta.innerText = "Etsitään paikkoja...";
            infoLaatikko.style.display = "none";

            if (reittiViiva) map.removeLayer(reittiViiva);
            merkit.forEach(m => map.removeLayer(m));
            merkit = [];

            var lahtoKoord = await haeKoordinaatit(lahtoPaikka);
            var maaranKoord = await haeKoordinaatit(maaranPaikka);

            if (!lahtoKoord || !maaranKoord) {
                statusKentta.innerText = "Virhe: Paikkaa ei löytynyt.";
                return;
            }

            statusKentta.innerText = "Haetaan yr.no säädataa ja reittiä...";

            var reittiData = await haeTieReitti(lahtoKoord, maaranKoord);
            if (!reittiData) {
                statusKentta.innerText = "Virhe: Reittiä ei voitu laskea.";
                return;
            }

            var tiePisteet = reittiData.geometry.coordinates.map(piste => [piste[1], piste[0]]);
            var puoliValiKoord = tiePisteet[Math.floor(tiePisteet.length / 2)];

            // Haetaan yr.no raakadata
            var rawLahto = await haeYrSaa(lahtoKoord[0], lahtoKoord[1]);
            var rawPuoli = await haeYrSaa(puoliValiKoord[0], puoliValiKoord[1]);
            var rawMaali = await haeYrSaa(maaranKoord[0], maaranKoord[1]);

            // Tulkitaan data selkokielelle
            var saaLahto = tulkitseSaa(rawLahto);
            var saaPuoli = tulkitseSaa(rawPuoli);
            var saaMaali = tulkitseSaa(rawMaali);

            // Piirretään reitti
            reittiViiva = L.polyline(tiePisteet, {color: '#ff9800', weight: 5}).addTo(map);
            map.fitBounds(reittiViiva.getBounds(), {padding: [50, 50]});

            // Tekstit karttapalloihin
            var tLahto = saaLahto ? `${saaLahto.teksti} (Sade: ${saaLahto.sade}mm)` : "Ei dataa";
            var tPuoli = saaPuoli ? `${saaPuoli.teksti} (Sade: ${saaPuoli.sade}mm)` : "Ei dataa";
            var tMaali = saaMaali ? `${saaMaali.teksti} (Sade: ${saaMaali.sade}mm)` : "Ei dataa";

            merkit.push(L.marker(lahtoKoord).addTo(map).bindPopup(`<b>Lähtö: ${lahtoPaikka}</b><br>${tLahto}`));
            merkit.push(L.marker(puoliValiKoord).addTo(map).bindPopup(`<b>Puoliväli</b><br>${tPuoli}`));
            merkit.push(L.marker(maaranKoord).addTo(map).bindPopup(`<b>Maali: ${maaranPaikka}</b><br>${tMaali}`));

            var etaisyysKm = (reittiData.distance / 1000).toFixed(1);
            var aikaMin = Math.round(reittiData.duration / 60);
            var aikaTeksti = aikaMin > 60 ? `${Math.floor(aikaMin/60)} t ${aikaMin%60} min` : `${aikaMin} min`;

            // Funktio, joka tarkistaa onko sadetta (jos sademäärä > 0)
            function sataako(saa) { return saa && saa.sade > 0; }

            infoLaatikko.innerHTML = `
                <strong>Matkatiedot:</strong><br>
                📋 ${etaisyysKm} km | ⏱️ ${aikaTeksti}<br><br>
                <strong>Sää reitillä (yr.no):</strong>
                <div class="weather-info ${sataako(saaLahto) ? 'rainy' : ''}">
                    <strong>Lähtö:</strong> ${tLahto}
                </div>
                <div class="weather-info ${sataako(saaPuoli) ? 'rainy' : ''}">
                    <strong>Puoliväli:</strong> ${tPuoli}
                </div>
                <div class="weather-info ${sataako(saaMaali) ? 'rainy' : ''}">
                    <strong>Maali:</strong> ${tMaali}
                </div>
            `;
            infoLaatikko.style.display = "block";
            statusKentta.innerText = "Sää haettu onnistuneesti yr.no -palvelusta!";
        }
    </script>

</body>
</html>
