<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoristin Sääreitit</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #e0e0e0; display: flex;
        }
        #sidebar {
            width: 350px; background-color: #1e1e1e; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; gap: 15px; z-index: 1000;
            overflow-y: auto;
        }
        h2 { margin-top: 0; color: #ff9800; font-size: 1.4rem; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #aaa; }
        input, select {
            background-color: #2d2d2d; border: 1px solid #444;
            color: #fff; padding: 10px; border-radius: 5px; font-size: 1rem;
        }
        input:focus, select:focus { border-color: #ff9800; outline: none; }
        button {
            background-color: #ff9800; color: #121212; border: none;
            padding: 12px; border-radius: 5px; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #e65100; }
        #status { color: #ffb74d; font-size: 0.9rem; font-style: italic; }
        
        /* Suosituslaatikko */
        #recommendation-box {
            padding: 12px; border-radius: 5px; font-size: 0.95rem;
            font-weight: bold; display: none; margin-top: 5px;
            border-left: 5px solid #ff9800; background-color: #2a251e;
        }
        
        #info-box {
            margin-top: 5px; padding: 10px; background-color: #2d2d2d;
            border-radius: 5px; font-size: 0.9rem; display: none;
        }
        .weather-info {
            margin-top: 8px; padding: 8px; background: #383838; 
            border-radius: 4px; border-left: 4px solid #4caf50;
        }
        .rainy { border-left-color: #2196f3 !important; background: #263238; }
        #map { flex-grow: 1; height: 100%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🏍️ Sääreitit</h2>
        
        <div class="input-group">
            <label for="start">Mistä:</label>
            <input type="text" id="start" placeholder="Esim. Helsinki" value="Helsinki">
        </div>

        <div class="input-group">
            <label for="end">Mihin:</label>
            <input type="text" id="end" placeholder="Esim. Tampere" value="Tampere">
        </div>

        <div class="input-group">
            <label for="startTime">Toivottu lähtöaika:</label>
            <select id="startTime">
                <option value="0">Heti</option>
                <option value="1">+1 tunti</option>
                <option value="2">+2 tuntia</option>
                <option value="3">+3 tuntia</option>
            </select>
        </div>

        <button onclick="haeReitti()">Laske ja optimoi ajoitus</button>
        
        <div id="status"></div>
        <div id="recommendation-box"></div>
        <div id="info-box"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        var map = L.map('map').setView([62.5, 26], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        var reittiViiva = null;
        var merkit = [];

        const saaKaannokset = {
            "clearsky": "Selkeää", "fair": "Melko selkeää", "partlycloudy": "Puolipilvistä",
            "cloudy": "Pilvistä", "lightrain": "Heikkoa vesisadetta", "rain": "Vesisadetta",
            "heavyrain": "Rankkasadetta", "lightrainshowers": "Heikkoja sadekuuroja",
            "rainshowers": "Sadekuuroja", "heavyrainshowers": "Voimakkaita sadekuuroja",
            "thunder": "Ukkosta", "snow": "Lumisadetta", "sleet": "Räntäsadetta", "fog": "Sumua",
            "rainandthunder": "Ukkossadetta", "lightrainandthunder": "Heikkoa ukkossadetta",
            "heavyrainandthunder": "Voimakasta ukkossadetta"
        };

        async function haeKoordinaatit(paikka) {
            try {
                var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(paikka)}&countrycodes=fi`;
                var vastaus = await fetch(url);
                var data = await vastaus.json();
                if (data && data.length > 0) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            } catch (e) {
                console.error("Koordinaattihaku epäonnistui", e);
            }
            return null;
        }

        async function haeTieReitti(lahto, maaranpaa) {
            try {
                var url = `https://router.project-osrm.org/route/v1/driving/${lahto[1]},${lahto[0]};${maaranpaa[1]},${maaranpaa[0]}?overview=full&geometries=geojson`;
                var vastaus = await fetch(url);
                var data = await vastaus.json();
                if (data && data.routes && data.routes.length > 0) return data.routes[0];
            } catch (e) {
                console.error("Reittihaku epäonnistui", e);
            }
            return null;
        }

        async function haeYrSaa(lat, lon) {
            try {
                var pyoristettyLat = lat.toFixed(4);
                var pyoristettyLon = lon.toFixed(4);
                var url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${pyoristettyLat}&lon=${pyoristettyLon}`;
                var vastaus = await fetch(url, {
                    headers: { 'User-Agent': 'MotoristinSaareitit/1.0 (motoristinsaapalvelu@gmail.com)' }
                });
                if (vastaus.ok) return await vastaus.json();
            } catch (e) {
                console.error("Säänhaku epäonnistui:", e);
            }
            return null;
        }

        function tulkitseSaaTulevaisuudessa(yrData, tavoiteAika) {
            if (!yrData || !yrData.properties || !yrData.properties.timeseries) return null;
            
            var aikasarja = yrData.properties.timeseries;
            var valittuEnnuste = aikasarja[0];
            var pieninEro = Infinity;
            
            for (var i = 0; i < aikasarja.length; i++) {
                var ennusteAika = new Date(aikasarja[i].time);
                var ero = Math.abs(ennusteAika - tavoiteAika);
                if (ero < pieninEro) {
                    pieninEro = ero;
                    valittuEnnuste = aikasarja[i];
                }
            }
            
            var data1h = valittuEnnuste.data.next_1_hours;
            var lampotila = valittuEnnuste.data.instant.details.air_temperature;
            var saaKoodi = data1h ? data1h.summary.symbol_code : "tuntematon";
            var sademaara = data1h ? data1h.details.precipitation_amount : 0;

            var puhdasKoodi = saaKoodi.split('_')[0];
            var suomiKuvaus = saaKaannokset[puhdasKoodi] || "Epävakaata";
            var kello = new Date(valittuEnnuste.time).toLocaleTimeString('fi-FI', {hour: '2-digit', minute:'2-digit'});

            return {
                teksti: `${suomiKuvaus}, ${Math.round(lampotila)}°C`,
                sade: sademaara,
                aika: kello
            };
        }

        async function haeReitti() {
            var lahtoPaikka = document.getElementById('start').value;
            var maaranPaikka = document.getElementById('end').value;
            var valittuViiveTunnit = parseInt(document.getElementById('startTime').value);
            var statusKentta = document.getElementById('status');
            var infoLaatikko = document.getElementById('info-box');
            var suositusLaatikko = document.getElementById('recommendation-box');

            statusKentta.innerText = "Etsitään paikkoja...";
            infoLaatikko.style.display = "none";
            suositusLaatikko.style.display = "none";

            if (reittiViiva) map.removeLayer(reittiViiva);
            merkit.forEach(m => map.removeLayer(m));
            merkit = [];

            var lahtoKoord = await haeKoordinaatit(lahtoPaikka);
            var maaranKoord = await haeKoordinaatit(maaranPaikka);

            if (!lahtoKoord || !maaranKoord) {
                statusKentta.innerText = "Virhe: Paikkaa ei löytynyt.";
                return;
            }

            statusKentta.innerText = "Lasketaan reittiä...";
            var reittiData = await haeTieReitti(lahtoKoord, maaranKoord);
            if (!reittiData) {
                statusKentta.innerText = "Virhe: Reittiä ei voitu laskea.";
                return;
            }

            var tiePisteet = reittiData.geometry.coordinates.map(piste => [piste[1], piste[0]]);
            reittiViiva = L.polyline(tiePisteet, {color: '#ff9800', weight: 5}).addTo(map);
            map.fitBounds(reittiViiva.getBounds(), {padding: [50, 50]});

            var matkaAikaMinuutit = Math.round(reittiData.duration / 60);
            var etaisyysKm = (reittiData.distance / 1000).toFixed(1);
            var aikaTeksti = matkaAikaMinuutit > 60 ? `${Math.floor(matkaAikaMinuutit/60)} t ${matkaAikaMinuutit%60} min` : `${matkaAikaMinuutit} min`;

            // Luodaan tarkastuspisteet (0h, 1h... ja määränpää)
            var pisteet = [];
            pisteet.push({ indeksi: 0, nimi: "Lähtöpaikka", viive: 0 });
            
            var tuntejaMatkassa = Math.floor(matkaAikaMinuutit / 60);
            for (var t = 1; t <= tuntejaMatkassa; t++) {
                var vMin = t * 60;
                if (matkaAikaMinuutit - vMin > 15) {
                    var suhde = vMin / matkaAikaMinuutit;
                    pisteet.push({
                        indeksi: Math.floor(suhde * (tiePisteet.length - 1)),
                        nimi: `Ajettu ${t} t`,
                        viive: vMin
                    });
                }
            }
            pisteet.push({ indeksi: tiePisteet.length - 1, nimi: "Määränpää", viive: matkaAikaMinuutit });

            statusKentta.innerText = "Ladataan sääennusteita ja optimoidaan aikataulua...";

            // Haetaan kaikkien pisteiden raaka säädata valmiiksi muistiin yhdellä kertaa
            var pisteidenSaaDatat = [];
            for (var p of pisteet) {
                var koord = tiePisteet[p.indeksi];
                var sData = await haeYrSaa(koord[0], koord[1]);
                pisteidenSaaDatat.push(sData);
            }

            // --- ÄLYKÄS AIKATAULUN VERTAILU ---
            // Lasketaan kokonaissademäärä kolmelle eri skenaariolle: Valittu aika, +1h ja +2h
            var skenaariot = [valittuViiveTunnit, valittuViiveTunnit + 1, valittuViiveTunnit + 2];
            var skenaarioTulokset = [];

            for (var viive of skenaariot) {
                var kokonaisSade = 0;
                var tulkitutSäät = [];

                for (var i = 0; i < pisteet.length; i++) {
                    var tAika = new Date();
                    tAika.setMinutes(tAika.getMinutes() + (viive * 60) + pisteet[i].viive);
                    var tulos = tulkitseSaaTulevaisuudessa(pisteidenSaaDatat[i], tAika);
                    if (tulos) {
                        kokonaisSade += tulos.sade;
                        tulkitutSäät.push(tulos);
                    }
                }
                skenaarioTulokset.push({ viive: viive, kokonaisSade: kokonaisSade, saas: tulkitutSäät });
            }

            // Valitaan paras (vähiten sadetta)
            var valittuSkenaario = skenaarioTulokset[0]; // Nykyinen valinta
            var parasSkenaario = skenaarioTulokset.reduce((prev, current) => (prev.kokonaisSade <= current.kokonaisSade) ? prev : current);

            // Tulostetaan suositusteksti
            suositusLaatikko.style.display = "block";
            if (parasSkenaario.viive === valittuViiveTunnit) {
                suositusLaatikko.style.color = "#4caf50";
                suositusLaatikko.style.borderLeftColor = "#4caf50";
                suositusLaatikko.innerHTML = "💡 Suositus: Valitsemasi lähtöaika on kuivin vaihtoehto!";
            } else {
                var tuntiEro = parasSkenaario.viive - valittuViiveTunnit;
                suositusLaatikko.style.color = "#ff9800";
                suositusLaatikko.style.borderLeftColor = "#ff9800";
                suositusLaatikko.innerHTML = `⚠️ Suositus: Siirrä lähtöä +${tuntiEro} tunti(a) eteenpäin! Vältät sillä sateita matkan varrella.`;
            }

            // Piirretään valitun skenaarion sää tiedot näkyviin (kartta ja lista)
            infoLaatikko.innerHTML = `
                <strong>Matkatiedot:</strong><br>
                📋 ${etaisyysKm} km | ⏱️ ${aikaTeksti}<br><br>
                <strong>Sääennuste matkan varrelta:</strong>
                <div id="weather-list"></div>
            `;
            infoLaatikko.style.display = "block";
            var saaListaElementti = document.getElementById('weather-list');

            for (var i = 0; i < pisteet.length; i++) {
                var p = pisteet[i];
                var koordinaatit = tiePisteet[p.indeksi];
                var saa = valittuSkenaario.saas[i];

                if (saa) {
                    var sateenVariLuokka = saa.sade > 0 ? 'rainy' : '';
                    var saaTekstiMuotoilu = `${saa.teksti} (Sade: ${saa.sade} mm)`;

                    var marker = L.marker(koordinaatit).addTo(map);
                    marker.bindPopup(`<b>${p.nimi} (Klo ${saa.aika})</b><br>${saaTekstiMuotoilu}`);
                    merkit.push(marker);

                    saaListaElementti.innerHTML += `
                        <div class="weather-info ${sateenVariLuokka}">
                            <strong>${p.nimi} (Klo ${saa.aika}):</strong><br>${saaTekstiMuotoilu}
                        </div>
                    `;
                }
            }

            statusKentta.innerText = "Sääreitti ja ajoitus optimoitu!";
        }
    </script>
</body>
</html>
