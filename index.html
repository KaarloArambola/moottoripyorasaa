<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoristin Sääreitit</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #e0e0e0; display: flex;
        }
        #sidebar {
            width: 320px; background-color: #1e1e1e; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; gap: 15px; z-index: 1000;
        }
        h2 { margin-top: 0; color: #ff9800; font-size: 1.4rem; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #aaa; }
        input {
            background-color: #2d2d2d; border: 1px solid #444;
            color: #fff; padding: 10px; border-radius: 5px; font-size: 1rem;
        }
        input:focus { border-color: #ff9800; outline: none; }
        button {
            background-color: #ff9800; color: #121212; border: none;
            padding: 12px; border-radius: 5px; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #e65100; }
        #status { color: #ffb74d; font-size: 0.9rem; font-style: italic; }
        #map { flex-grow: 1; height: 100%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🏍️ Sääreitit</h2>
        
        <div class="input-group">
            <label for="start">Mistä:</label>
            <input type="text" id="start" placeholder="Esim. Helsinki" value="Helsinki">
        </div>

        <div class="input-group">
            <label for="end">Mihin:</label>
            <input type="text" id="end" placeholder="Esim. Tampere" value="Tampere">
        </div>

        <button onclick="haeReitti()">Laske kuiva reitti</button>
        
        <div id="status"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        var map = L.map('map').setView([62.5, 26], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        // Tallennetaan karttamerkit ja viivat muuttujiin, jotta voimme poistaa vanhat uuden haun tieltä
        var reittiViiva = null;
        var merkit = [];

        // Apufunktio, joka hakee paikan koordinaatit nimen perusteella
        async function haeKoordinaatit(paikka) {
            var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(paikka)}&countrycodes=fi`;
            
            var vastaus = await fetch(url);
            var data = await vastaus.json();
            
            if (data && data.length > 0) {
                // Palautetaan leveysaste (lat) ja pituusaste (lon) numeroina
                return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            }
            return null;
        }

        // Pääfunktio
        async function haeReitti() {
            var lahtoPaikka = document.getElementById('start').value;
            var maaranPaikka = document.getElementById('end').value;
            var statusKentta = document.getElementById('status');

            statusKentta.innerText = "Esitellään paikkoja...";

            // Tyhjennetään vanhat piirrokset kartalta
            if (reittiViiva) map.removeLayer(reittiViiva);
            merkit.forEach(m => map.removeLayer(m));
            merkit = [];

            // Haetaan molempien paikkojen koordinaatit yhtä aikaa
            var lahtoKoord = await haeKoordinaatit(lahtoPaikka);
            var maaranKoord = await haeKoordinaatit(maaranPaikka);

            if (!lahtoKoord || !maaranKoord) {
                statusKentta.innerText = "Virhe: Paikkaa ei löytynyt Suomesta.";
                return;
            }

            statusKentta.innerText = "Paikat löydetty! Piirretään suora viiva...";

            // Lisätään merkit kartalle
            var m1 = L.marker(lahtoKoord).addTo(map).bindPopup(lahtoPaikka);
            var m2 = L.marker(maaranKoord).addTo(map).bindPopup(maaranPaikka);
            merkit.push(m1, m2);

            // Piirretään suora viiva pisteiden välille (tämä korvataan myöhemmin oikealla tiereitillä)
            reittiViiva = L.polyline([lahtoKoord, maaranKoord], {color: '#ff9800', weight: 4}).addTo(map);

            // Sovitetaan karttanäkymä niin, että molemmat pisteet näkyvät kerralla
            var bounds = L.latLngBounds([lahtoKoord, maaranKoord]);
            map.fitBounds(bounds, {padding: [50, 50]});

            statusKentta.innerText = "Valmis! Seuraavaksi haetaan oikeat tiet.";
        }
    </script>

</body>
</html>
